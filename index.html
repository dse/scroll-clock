<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <link rel="stylesheet" href="css/main.css">
        <link rel="stylesheet" href="css/fonts.css">
        <link rel="stylesheet" href="css/menu.css">
        <link rel="stylesheet" href="css/clock.css?v=9">
        <script src="js/clock.js"></script>
        <script src="../clocks/js/modal.js"></script>
        <title>Scroll Clock</title>
    </head>
    <body>
        <div class="clock" id="clock">
            <div class="clock-viewmaster">
                <div class="clock-dial" id="hours">
                    <div class="clock-dial-positioner">
                        <div class="clock-numeral">00</div>
                        <div class="clock-numeral">01</div>
                        <div class="clock-numeral">02</div>
                        <div class="clock-numeral">03</div>
                        <div class="clock-numeral">04</div>
                        <div class="clock-numeral">05</div>
                        <div class="clock-numeral">06</div>
                        <div class="clock-numeral">07</div>
                        <div class="clock-numeral">08</div>
                        <div class="clock-numeral">09</div>
                        <div class="clock-numeral">10</div>
                        <div class="clock-numeral">11</div>
                        <div class="clock-numeral">12</div>
                        <div class="clock-numeral">13</div>
                        <div class="clock-numeral">14</div>
                        <div class="clock-numeral">15</div>
                        <div class="clock-numeral">16</div>
                        <div class="clock-numeral">17</div>
                        <div class="clock-numeral">18</div>
                        <div class="clock-numeral">19</div>
                        <div class="clock-numeral">20</div>
                        <div class="clock-numeral">21</div>
                        <div class="clock-numeral">22</div>
                        <div class="clock-numeral">23</div>
                        <div class="clock-numeral">00</div>
                    </div>
                </div>
            </div>
            <div class="clock-viewmaster">
                <div class="clock-dial" id="minutes-tens">
                    <div class="clock-dial-positioner">
                        <div class="clock-numeral">0</div>
                        <div class="clock-numeral">1</div>
                        <div class="clock-numeral">2</div>
                        <div class="clock-numeral">3</div>
                        <div class="clock-numeral">4</div>
                        <div class="clock-numeral">5</div>
                        <div class="clock-numeral">0</div>
                    </div>
                </div>
                <div class="clock-dial" id="minutes-ones">
                    <div class="clock-dial-positioner">
                        <div class="clock-numeral">0</div>
                        <div class="clock-numeral">1</div>
                        <div class="clock-numeral">2</div>
                        <div class="clock-numeral">3</div>
                        <div class="clock-numeral">4</div>
                        <div class="clock-numeral">5</div>
                        <div class="clock-numeral">6</div>
                        <div class="clock-numeral">7</div>
                        <div class="clock-numeral">8</div>
                        <div class="clock-numeral">9</div>
                        <div class="clock-numeral">0</div>
                    </div>
                </div>
            </div>
            <div class="clock-viewmaster">
                <div class="clock-dial" id="seconds-tens">
                    <div class="clock-dial-positioner">
                        <div class="clock-numeral">0</div>
                        <div class="clock-numeral">1</div>
                        <div class="clock-numeral">2</div>
                        <div class="clock-numeral">3</div>
                        <div class="clock-numeral">4</div>
                        <div class="clock-numeral">5</div>
                        <div class="clock-numeral">0</div>
                    </div>
                </div>
                <div class="clock-dial" id="seconds-ones">
                    <div class="clock-dial-positioner">
                        <div class="clock-numeral">0</div>
                        <div class="clock-numeral">1</div>
                        <div class="clock-numeral">2</div>
                        <div class="clock-numeral">3</div>
                        <div class="clock-numeral">4</div>
                        <div class="clock-numeral">5</div>
                        <div class="clock-numeral">6</div>
                        <div class="clock-numeral">7</div>
                        <div class="clock-numeral">8</div>
                        <div class="clock-numeral">9</div>
                        <div class="clock-numeral">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div id="menu" class="menu">
            <ul class="menu-list">
                <li class="menu-list-item">
                    <a class="menu-link" href="../clocks/">&#x1f552;</a>
                </li>
                <li class="menu-list-item">
                    <a class="menu-link" href="#" data-toggle-modal="#console-modal">&gt;...</a>
                </li>
            </ul>
        </div>
        <div id="console-modal" class="modal">
            <div class="modal-backdrop"></div>
            <div class="modal-dialog">
                <div class="modal-close">
                    <a class="modal-close-button" data-toggle-modal="#console-modal" href="#">&times;</a>
                </div>
                <h1>
                    Console
                </h1>
                <pre id="console-replacer" style="overflow-x: auto;"></pre>
            </div>
        </div>
        <script>
            initModalToggles();
            if (document.readyState === 'complete') {
                init();
            } else {
                window.addEventListener('load', init);
            }
            var clock;
            function init() {
                var hoursDial       = new Dial(document.getElementById("hours"));
                var minutesTensDial = new Dial(document.getElementById("minutes-tens"));
                var minutesOnesDial = new Dial(document.getElementById("minutes-ones"));
                var secondsTensDial = new Dial(document.getElementById("seconds-tens"));
                var secondsOnesDial = new Dial(document.getElementById("seconds-ones"));
                clock = new Clock(hoursDial,
                                  minutesTensDial, minutesOnesDial,
                                  secondsTensDial, secondsOnesDial);
                clock.start();
            }
        </script>
    </body>
</html>
