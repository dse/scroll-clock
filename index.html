<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">

        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <link rel="stylesheet" href="css/main.css">
        <link rel="stylesheet" href="css/fonts.css">
        <link rel="stylesheet" href="css/menu.css">
        <link rel="stylesheet" href="css/clock.css">
        <link rel="stylesheet" href="../clocks/css/menu.css">
        <script src="js/clock.js"></script>
        <title>Scroll Clock</title>
    </head>
    <body>

                        <div class="clock-numeral">07</div>
                        <div class="clock-numeral">08</div>
                        <div class="clock-numeral">09</div>

                        <div class="clock-numeral">11</div>
                        <div class="clock-numeral">12</div>
                        <div class="clock-numeral">13</div>
                        <div class="clock-numeral">14</div>

            <div class="clock-viewmaster">

                </div>
                <div class="clock-dial" id="minutes-ones">
                    <div class="clock-dial-positioner">

                        <div class="clock-numeral">1</div>
                        <div class="clock-numeral">2</div>
                        <div class="clock-numeral">3</div>

                </div>
            </div>
            <div class="clock-colon">:</div>
            <div class="clock-viewmaster">
                <div class="clock-dial" id="seconds-tens">
                    <div class="clock-dial-positioner">
                        <div class="clock-numeral">0</div>
                        <div class="clock-numeral">1</div>
                        <div class="clock-numeral">2</div>
                        <div class="clock-numeral">3</div>
                        <div class="clock-numeral">4</div>
                        <div class="clock-numeral">5</div>
                        <div class="clock-numeral">0</div>
                    </div>
                </div>
                <div class="clock-dial" id="seconds-ones">
                    <div class="clock-dial-positioner">
                        <div class="clock-numeral">0</div>
                        <div class="clock-numeral">1</div>
                        <div class="clock-numeral">2</div>
                        <div class="clock-numeral">3</div>
                        <div class="clock-numeral">4</div>
                        <div class="clock-numeral">5</div>
                        <div class="clock-numeral">6</div>
                        <div class="clock-numeral">7</div>
                        <div class="clock-numeral">8</div>
                        <div class="clock-numeral">9</div>
                        <div class="clock-numeral">0</div>
                    </div>
                </div>
            </div>
            <div class="clock-colon">&nbsp;</div>
            <div class="clock-viewmaster clock-viewmaster-date">
                <div class="clock-dial" id="day">
                    <div class="clock-dial-positioner">
                        <div class="clock-numeral">SUN</div>
                        <div class="clock-numeral">MON</div>
                        <div class="clock-numeral">TUE</div>
                        <div class="clock-numeral">WED</div>
                        <div class="clock-numeral">THU</div>
                        <div class="clock-numeral">FRI</div>
                        <div class="clock-numeral">SAT</div>
                        <div class="clock-numeral">SUN</div>
                    </div>
                </div>
            </div>
            <div class="clock-colon"></div>
            <div class="clock-viewmaster clock-viewmaster-date">
                <div class="clock-dial" id="date">

                        <div class="clock-numeral">13</div>
                        <div class="clock-numeral">14</div>
                        <div class="clock-numeral">15</div>
                        <div class="clock-numeral">16</div>
                        <div class="clock-numeral">17</div>
                        <div class="clock-numeral">18</div>

        </div>
        <div id="menu" class="menu">
            <ul class="menu__list">
                <li class="menu__list-item">
                    <a class="menu__link" href="../clocks/index.html">&#x1f552;</a>
                </li>
            </ul>
        </div>
        <script>
            var clock;
                var hoursDial;
                var minutesTensDial;
                var minutesOnesDial;
                var secondsTensDial;
                var secondsOnesDial;
                var dayDial;
                var dateDial;

            function init() {
                hoursDial       = new Dial(document.getElementById("hours"));
                minutesTensDial = new Dial(document.getElementById("minutes-tens"));
                minutesOnesDial = new Dial(document.getElementById("minutes-ones"));
                secondsTensDial = new Dial(document.getElementById("seconds-tens"));
                secondsOnesDial = new Dial(document.getElementById("seconds-ones"));
                dayDial  = new Dial(document.getElementById("day"));
                dateDial = new Dial(document.getElementById("date"));
                clock = new Clock(hoursDial,
                                  minutesTensDial, minutesOnesDial,
                                  secondsTensDial, secondsOnesDial,
                                  dayDial,
                                  dateDial);
                clock.start();
            }
            if (document.readyState === 'complete') {
                init();
            } else {
                window.addEventListener('load', init);
            }
        </script>
    </body>
</html>
