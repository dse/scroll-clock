<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
        <link rel="stylesheet" href="css/main.css">
        <script src="js/main.js"></script>
        <title>Odom Clock</title>
    </head>
    <body>
        <div class="scroll-clock">
            <div class="scroll-clock__dial-set">
                <div class="scroll-clock__viewmaster">
                    <div class="scroll-clock__dial scroll-clock__dial--hours" id="hours">
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="0">00</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="1">01</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="2">02</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="3">03</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="4">04</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="5">05</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="6">06</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="7">07</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="8">08</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="9">09</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="10">10</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="11">11</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="12">12</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="13">13</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="14">14</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="15">15</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="16">16</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="17">17</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="18">18</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="19">19</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="20">20</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="21">21</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="22">22</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="23">23</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--hours" data-value="24">00</div>
                    </div>
                </div>
                <div class="scroll-clock__viewmaster">
                    <div class="scroll-clock__dial scroll-clock__dial--minutes-tens-digit" id="minutes-tens">
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-tens-digit" data-value="0">0</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-tens-digit" data-value="1">1</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-tens-digit" data-value="2">2</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-tens-digit" data-value="3">3</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-tens-digit" data-value="4">4</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-tens-digit" data-value="5">5</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-tens-digit" data-value="0">0</div>
                    </div>
                    <div class="scroll-clock__dial scroll-clock__dial--minutes-ones-digit" id="minutes-ones">
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-ones-digit" data-value="0">0</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-ones-digit" data-value="1">1</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-ones-digit" data-value="2">2</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-ones-digit" data-value="3">3</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-ones-digit" data-value="4">4</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-ones-digit" data-value="5">5</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-ones-digit" data-value="6">6</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-ones-digit" data-value="7">7</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-ones-digit" data-value="8">8</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-ones-digit" data-value="9">9</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--minutes-ones-digit" data-value="0">0</div>
                    </div>
                </div>
                <div class="scroll-clock__viewmaster">
                    <div class="scroll-clock__dial scroll-clock__dial--seconds-tens-digit" id="seconds-tens">
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tens-digit" data-value="0">0</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tens-digit" data-value="1">1</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tens-digit" data-value="2">2</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tens-digit" data-value="3">3</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tens-digit" data-value="4">4</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tens-digit" data-value="5">5</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tens-digit" data-value="0">0</div>
                    </div>
                    <div class="scroll-clock__dial scroll-clock__dial--seconds-ones-digit" id="seconds-ones">
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-ones-digit" data-value="0">0</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-ones-digit" data-value="1">1</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-ones-digit" data-value="2">2</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-ones-digit" data-value="3">3</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-ones-digit" data-value="4">4</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-ones-digit" data-value="5">5</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-ones-digit" data-value="6">6</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-ones-digit" data-value="7">7</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-ones-digit" data-value="8">8</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-ones-digit" data-value="9">9</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-ones-digit" data-value="0">0</div>
                    </div>
                </div>
                <div class="scroll-clock__viewmaster">
                    <div class="scroll-clock__dial scroll-clock__dial--seconds-tenths-digit" id="seconds-tenths">
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tenths-digit" data-value="0">0</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tenths-digit" data-value="1">1</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tenths-digit" data-value="2">2</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tenths-digit" data-value="3">3</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tenths-digit" data-value="4">4</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tenths-digit" data-value="5">5</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tenths-digit" data-value="6">6</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tenths-digit" data-value="7">7</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tenths-digit" data-value="8">8</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tenths-digit" data-value="9">9</div>
                        <div class="scroll-clock__numeral scroll-clock__numeral--seconds-tenths-digit" data-value="0">0</div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
